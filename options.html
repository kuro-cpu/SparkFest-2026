<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Process Account</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="SULO.css">
</head>
<body>

  <main class="app-container option-screen">
    
    <div class="bg-circle tl-1"></div>
    <div class="bg-circle tl-2"></div>
    <div class="bg-circle tl-3"></div>
    <div class="bg-circle tl-4"></div>

    <div class="options-content">
      <p class="options-message">Choose the options to process your account</p>
      
      <div class="options-btn-group">
        <button type="button" class="option-btn" id="joinSchoolBtn">Join School</button>
        <button type="button" class="option-btn" id="registerSchoolBtn">Register School</button>
      </div>
    </div>

    <div class="bg-circle br-1"></div>
    <div class="bg-circle br-2"></div>
    <div class="bg-circle br-3"></div>

  </main>

  <script src="config.js"></script>

  <script>
  // Join School Route
  document.getElementById('joinSchoolBtn').addEventListener('click', () => {
    window.location.href = 'join-school.html';
  });

  // Register School Route
  document.getElementById('registerSchoolBtn').addEventListener('click', () => {
    window.location.href = 'register-school.html';
  });
</script>
</body>
</html>
