<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gemini AI Assistant</title>
  <link rel="stylesheet" href="SULO.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="gemini-view-body">

  <div class="phone-wrapper">
    
    <div class="status-bar-spacer"></div>

    <header class="gemini-header">
      <a href="home.html" class="back-arrow-link">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="15 18 9 12 15 6"></polyline>
        </svg>
      </a>
      <div class="header-title-group">
        <img src="gemini-color.png" alt="Gemini Spark" class="header-spark-logo">
        <h1 class="gemini-main-title">Gemini AI</h1>
      </div>
      <div style="width: 24px;"></div> </header>

    <p class="gemini-confidentiality-notice">
      No need to panic, all the conversations here are confidential.
    </p>

    <main class="gemini-chat-stream" id="chatContainer"></main>

    <div class="gemini-input-container">
      <div class="gemini-input-pill-box">
        <textarea class="gemini-text-field" placeholder="Message..." rows="1"></textarea>
        <div class="input-icon-actions">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#666" stroke-width="2"><path d="M12 1v11a3 3 0 0 1-3-3V4a3 3 0 0 1 6 0v5a3 3 0 0 1-3 3z"></path><path d="M19 10v1a7 7 0 0 1-14 0v-1"></path><line x1="12" y1="19" x2="12" y2="23"></line></svg>
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#666" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><path d="M8 14s1.5 2 4 2 4-2 4-2"></path><line x1="9" y1="9" x2="9.01" y2="9"></line><line x1="15" y1="9" x2="15.01" y2="9"></line></svg>
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#666" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><circle cx="8.5" cy="8.5" r="1.5"></circle><polyline points="21 15 16 10 5 21"></polyline></svg>
        </div>
      </div>
    </div>

  </div> 
  
  <script src="config.js"></script>
  <script src="SULO.js"></script>

</body>
</html>
