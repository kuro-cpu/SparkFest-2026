<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>SULO - Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="SULO.css">
</head>
<body>

  <main class="app-container dashboard-container">
    
    <header class="dashboard-hero">
      <button class="settings-btn" aria-label="Settings">
        <svg viewBox="0 0 24 24" width="24" height="24" fill="#FCA000">
          <path d="M19.43 12.98c.04-.32.07-.64.07-.98s-.03-.66-.07-.98l2.11-1.65c.19-.15.24-.42.12-.64l-2-3.46c-.12-.22-.39-.3-.61-.22l-2.49 1c-.52-.4-1.08-.73-1.69-.98l-.38-2.65C14.46 2.18 14.25 2 14 2h-4c-.25 0-.46.18-.49.42l-.38 2.65c-.61.25-1.17.59-1.69.98l-2.49-1c-.23-.09-.49 0-.61.22l-2 3.46c-.13.22-.07.49.12.64l2.11 1.65c-.04.32-.07.65-.07.98s.03.66.07.98l-2.11 1.65c-.19.15-.24.42-.12.64l2 3.46c.12.22.39.3.61.22l2.49-1c.52.4 1.08.73 1.69.98l.38 2.65c.03.24.24.42.49.42h4c.25 0 .46-.18.49-.42l.38-2.65c.61-.25 1.17-.59 1.69-.98l2.49 1c.23.09.49 0 .61-.22l2-3.46c.12-.22.07-.49-.12-.64l-2.11-1.65zM12 15.5c-1.93 0-3.5-1.57-3.5-3.5s1.57-3.5 3.5-3.5 3.5 1.57 3.5 3.5-1.57 3.5-3.5 3.5z"/>
        </svg>
      </button>

      <div class="profile-row">
        <div class="profile-avatar-wrapper">
          <div class="avatar-placeholder"></div>
        </div>
        <div class="greeting-text-container">
          <p class="greeting-sub">Magandang araw,</p>
          <h1 class="greeting-name" id="dashboardGreetingName">Akito!</h1>
        </div>
      </div>
    </header>

    <section class="search-section">
      <div class="search-bar-wrapper">
        <span class="search-icon">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="#A0A0A0">
            <path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/>
          </svg>
        </span>
        <input type="text" class="dashboard-search" placeholder="Search">
      </div>
    </section>

    <section class="menu-cards-stack">
      <a href="report-concern.html" class="menu-card" style="text-decoration: none; color: inherit;">
    <div class="card-icon-box">
      <img src="tracking.png" alt="Report" class="card-img-icon">
    </div>
    <div class="card-details">
      <h3 class="card-title">Report A Concern</h3>
      <p class="card-subtitle">Submit incident alerts</p>
    </div>
  </a>

      <a href="Gemini-ai.html" class="menu-card" style="text-decoration: none; color: inherit;">
  <div class="card-icon-box">
    <img src="gemini-color.png" alt="Gemini" class="card-img-icon">
  </div>
  <div class="card-details">
    <h3 class="card-title">Ask Gemini</h3>
    <p class="card-subtitle">Get instant guidelines</p>
  </div>
</div>

      <a href="safety-resources.html" class="menu-card" style="text-decoration: none; color: inherit;">
  <div class="card-icon-box">
    <img src="shield.png" alt="Safety Resources" class="card-img-icon">
  </div>
  <div class="card-details">
    <h3 class="card-title">Safety Resources</h3>
    <p class="card-subtitle">Browse educational guides</p>
  </div>
</a>

      <a href="emergency-contacts.html" class="menu-card" style="text-decoration: none; color: inherit;">
  <div class="card-icon-box">
    <img src="emergency-call.png" alt="Emergency Contacts" class="card-img-icon">
  </div>
  <div class="card-details">
    <h3 class="card-title">Emergency Contacts</h3>
    <p class="card-subtitle">Call important hotlines</p>
  </div>
</a>
</div>
      </div>
    </section>

  </main>

  <script src="config.js"></script>
  <script src="SULO.js"></script>
  
</body>
</html>
